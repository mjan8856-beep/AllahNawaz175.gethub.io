<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allah Nawaz — Site of the Day</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  position:relative;
}

.hero h1{
  font-size:120px;
  letter-spacing:-4px;
  z-index:2;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

/* SECTION */
.section{
  padding:150px 80px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
}

.card{
  overflow:hidden;
  border-radius:20px;
}

.card img{
  width:100%;
  transition:1s;
}

.card:hover img{
  transform:scale(1.1);
}

/* TEXT REVEAL */
.reveal{
  opacity:0;
  transform:translateY(100px);
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{font-size:60px;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<section class="hero">
  <h1 id="title">Allah Nawaz</h1>
  <canvas id="bg"></canvas>
</section>

<section class="section">
  <h2 class="reveal">Selected Work</h2>

  <div class="grid">
    <div class="card reveal"><img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/84667a218563555.67a371a228d8b.png"></div>
    <div class="card reveal"><img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/387626216365471.677eb030b492e.png"></div>
    <div class="card reveal"><img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/da0332216364721.677eae5893b44.png"></div>
    <div class="card reveal"><img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/ecc1ed237969847.690b5825347ce.png"></div>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* TEXT REVEAL */
gsap.utils.toArray(".reveal").forEach(el=>{
  gsap.fromTo(el,
    {y:100, opacity:0},
    {
      y:0,
      opacity:1,
      duration:1,
      scrollTrigger:{
        trigger:el,
        start:"top 80%"
      }
    }
  )
});

/* HERO TEXT ANIMATION */
gsap.from("#title",{
  y:100,
  opacity:0,
  duration:1.5,
  ease:"power4.out"
});

/* THREE JS BACKGROUND */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
  canvas:document.getElementById("bg"),
  alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

/* GEOMETRY */
const geometry = new THREE.TorusKnotGeometry(1,0.3,100,16);
const material = new THREE.MeshBasicMaterial({wireframe:true});
const mesh = new THREE.Mesh(geometry, material);

scene.add(mesh);

/* ANIMATION LOOP */
function animate(){
  requestAnimationFrame(animate);

  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.01;

  renderer.render(scene, camera);
}
animate();

/* SCROLL ROTATION */
gsap.to(mesh.rotation,{
  y:6,
  scrollTrigger:{
    trigger:"body",
    start:"top top",
    end:"bottom bottom",
    scrub:true
  }
});
</script>

</body>
</html>
