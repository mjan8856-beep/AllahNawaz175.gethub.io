<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Allah Nawaz — Product Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --fg:#fff;
  --muted:rgba(255,255,255,0.6);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--fg);
  overflow-x:hidden;
}

/* CURSOR */
.cursor{
  width:20px;height:20px;
  border:1px solid #fff;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:.08s ease;
  z-index:9999;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero h1{
  font-size:clamp(60px,10vw,140px);
  line-height:.9;
  letter-spacing:-2px;
}

.hero span{
  color:rgba(255,255,255,0.3);
}

.hero p{
  margin-top:20px;
  max-width:500px;
  color:var(--muted);
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:14px 30px;
  border-radius:50px;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  background:#fff;
  color:#000;
}

/* SECTION */
.section{
  padding:120px 40px;
  max-width:1100px;
  margin:auto;
}

/* PROJECT */
.project{
  margin-bottom:80px;
  opacity:0;
  transform:translateY(60px);
  transition:1s;
}
.project.show{
  opacity:1;
  transform:none;
}

.project img{
  width:100%;
  border-radius:20px;
  margin-top:20px;
  transition:1s;
}
.project:hover img{
  transform:scale(1.05);
}

/* PARALLAX BG */
.parallax{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle,rgba(255,255,255,0.08),transparent);
  z-index:-1;
}

/* FOOTER */
footer{
  padding:80px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="cursor"></div>

<section class="hero">
  <div class="parallax"></div>
  <h1 id="title">Allah Nawaz<span>.</span></h1>
  <p>Crafting high-end digital experiences with strategy, motion, and clarity.</p>
  <div class="btn">View Work</div>
</section>

<section class="section">
  <h2>Selected Work</h2>

  <div class="project">
    <h3>AI Dashboard</h3>
    <img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/ecc1ed237969847.690b5825347ce.png">
  </div>

  <div class="project">
    <h3>E-commerce UX</h3>
    <img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400_webp/387626216365471.677eb030b492e.png">
  </div>

</section>

<footer>
  <h2>Let’s Work Together</h2>
  <p>Email: mjan8856@gmail.com</p>
</footer>

<script>
/* CURSOR */
const cursor = document.querySelector(".cursor");
window.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* SCROLL REVEAL */
const projects = document.querySelectorAll(".project");

window.addEventListener("scroll", ()=>{
  projects.forEach(p=>{
    const top = p.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      p.classList.add("show");
    }
  });
});

/* PARALLAX */
window.addEventListener("scroll", ()=>{
  document.querySelector(".parallax").style.transform =
    `translateY(${window.scrollY * 0.3}px)`;
});

/* TEXT SPLIT EFFECT */
const title = document.getElementById("title");
const letters = title.innerText.split("");
title.innerHTML = "";

letters.forEach((l,i)=>{
  const span = document.createElement("span");
  span.innerText = l;
  span.style.opacity = 0;
  span.style.display = "inline-block";
  span.style.transform = "translateY(40px)";
  span.style.transition = "0.6s ease";
  span.style.transitionDelay = i * 0.05 + "s";
  title.appendChild(span);

  setTimeout(()=>{
    span.style.opacity = 1;
    span.style.transform = "translateY(0)";
  },100);
});
</script>

</body>
</html>
